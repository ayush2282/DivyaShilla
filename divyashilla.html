<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>DivyaShilla Stone Work — Handcrafted in Stone</title>
<meta name="description" content="DivyaShilla Stone Work — handcrafted heritage stone for homes that stand apart. Kolhapur. Reach us on WhatsApp, browse our collection, or visit the studio." />
<meta name="theme-color" content="#0F0F0F" />
<meta property="og:title" content="DivyaShilla Stone Work" />
<meta property="og:description" content="Handcrafted in Stone. Made for Generations." />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --obsidian:#0F0F0F;
    --obsidian-2:#070707;
    --panel-a:#171513;
    --panel-b:#0c0b0a;
    --gold:#C8A35F;
    --gold-lt:#EBD3A0;
    --gold-dp:#8C6B33;
    --tulsi:#8CA85A;
    --ink:#EDE6D6;
    --ink-soft:#B6AB94;
    --line:rgba(200,163,95,.22);
    --line-soft:rgba(200,163,95,.12);
    --shadow:0 22px 50px -20px rgba(0,0,0,.85), 0 4px 14px -6px rgba(0,0,0,.6);
    --serif:"Cormorant Garamond", Georgia, "Times New Roman", serif;
    --sans:"Jost", "Helvetica Neue", Arial, sans-serif;
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    min-height:100dvh;
    background:var(--obsidian);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }

  /* Ambient ground: a faint warm glow at the threshold + barely-there stone grain */
  .bg{position:fixed; inset:0; z-index:-2; pointer-events:none;
    background:
      radial-gradient(120% 70% at 50% -8%, rgba(200,163,95,.14), rgba(200,163,95,0) 46%),
      radial-gradient(90% 55% at 50% 112%, rgba(140,168,90,.05), rgba(0,0,0,0) 55%),
      linear-gradient(180deg, #131210 0%, var(--obsidian) 30%, var(--obsidian-2) 100%);
  }
  .grain{position:fixed; inset:0; z-index:-1; pointer-events:none; opacity:.05; mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .wrap{
    position:relative;
    max-width:560px;
    margin:0 auto;
    padding:clamp(34px,7vw,64px) clamp(20px,5.5vw,40px) 40px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* ---------- Hero / threshold ---------- */
  .hero{position:relative; width:100%; display:flex; flex-direction:column; align-items:center;}

  .arch{
    position:absolute;
    top:-2%; left:50%; transform:translateX(-50%);
    width:min(118%, 460px); height:auto; z-index:0;
    filter:drop-shadow(0 0 18px rgba(200,163,95,.18));
    pointer-events:none;
  }
  .arch path{
    fill:none; stroke:url(#archGrad); stroke-width:1.4;
    stroke-linecap:round; stroke-linejoin:round;
  }
  .arch .finial{fill:var(--gold); stroke:none;}

  .logo-shell{position:relative; z-index:1; margin-top:clamp(10px,3vw,22px);}
  .logo{
    display:block;
    width:clamp(190px, 54vw, 256px);
    height:auto;
    filter:drop-shadow(0 10px 26px rgba(0,0,0,.6));
  }

  .mark{position:relative; z-index:1; text-align:center; margin-top:6px;}
  .wordmark{
    font-family:var(--serif);
    font-weight:600;
    font-size:clamp(40px, 12vw, 62px);
    line-height:.96;
    letter-spacing:.5px;
    margin:0;
    background:linear-gradient(176deg,#F8EBC4 0%, #E8CD8F 16%, var(--gold) 46%, #9C7A39 74%, #E6C988 100%);
    -webkit-background-clip:text; background-clip:text;
    color:var(--gold-lt);
    -webkit-text-fill-color:transparent;
    position:relative;
  }
  .wordmark .x{ font-style:normal; }
  .sub{
    font-family:var(--sans);
    font-weight:400;
    font-size:clamp(11px,3.1vw,13px);
    letter-spacing:.52em;
    text-indent:.52em;
    color:var(--gold);
    margin:14px 0 0;
    opacity:.92;
  }

  .divider{display:flex; align-items:center; justify-content:center; gap:14px; width:min(260px,72%); margin:18px 0 0;}
  .divider::before,.divider::after{content:""; height:1px; flex:1; background:linear-gradient(90deg,transparent,var(--line),transparent);}
  .divider svg{width:18px; height:18px; color:var(--gold); opacity:.9; flex:0 0 auto;}

  .tagline{
    font-family:var(--serif);
    font-style:italic;
    font-weight:500;
    font-size:clamp(17px,5vw,22px);
    line-height:1.35;
    color:var(--ink);
    margin:16px 0 0;
    text-align:center;
    max-width:22ch;
  }
  .tagline b{color:var(--gold-lt); font-weight:500;}

  /* ---------- Cards ---------- */
  .cards{
    width:100%;
    margin-top:clamp(28px,7vw,40px);
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
  }

  .card{
    position:relative;
    min-width:0;
    display:flex;
    align-items:center;
    gap:16px;
    padding:16px 18px;
    border-radius:18px;
    text-decoration:none;
    color:var(--ink);
    background:linear-gradient(152deg, var(--panel-a), var(--panel-b));
    border:1px solid var(--line-soft);
    box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,.03);
    overflow:hidden;
    isolation:isolate;
    transition:transform .4s cubic-bezier(.2,.7,.2,1), border-color .4s ease, box-shadow .4s ease;
  }
  /* raking light sweep on hover */
  .card::before{
    content:"";
    position:absolute; top:0; bottom:0; left:-60%;
    width:55%;
    background:linear-gradient(100deg, transparent, rgba(235,211,160,.16), transparent);
    transform:skewX(-16deg);
    transition:left .65s cubic-bezier(.25,.8,.3,1);
    z-index:0; pointer-events:none;
  }
  .card:hover::before,.card:focus-visible::before{ left:130%; }
  .card:hover,.card:focus-visible{
    transform:translateY(-3px);
    border-color:var(--gold);
    box-shadow:0 26px 56px -20px rgba(0,0,0,.9), 0 0 0 1px rgba(200,163,95,.18), 0 10px 30px -14px rgba(200,163,95,.28);
    outline:none;
  }
  .card:focus-visible{ box-shadow:0 0 0 2px var(--obsidian), 0 0 0 4px var(--gold); }

  .roundel{
    position:relative; z-index:1;
    flex:0 0 auto;
    width:50px; height:50px;
    display:grid; place-items:center;
    border-radius:50%;
    color:var(--gold);
    background:radial-gradient(circle at 32% 28%, rgba(235,211,160,.16), rgba(200,163,95,.04) 60%, rgba(0,0,0,0) 72%);
    border:1px solid var(--line);
    box-shadow:inset 0 1px 1px rgba(255,245,220,.14), inset 0 -2px 6px rgba(0,0,0,.5);
    transition:color .4s ease, border-color .4s ease, transform .5s cubic-bezier(.2,.7,.2,1);
  }
  .card:hover .roundel{ color:var(--gold-lt); border-color:var(--gold); transform:scale(1.05); }
  .roundel svg{width:23px; height:23px; display:block;}

  .body{position:relative; z-index:1; flex:1 1 auto; min-width:0;}
  .label{
    font-family:var(--sans); font-weight:500;
    font-size:15.5px; letter-spacing:.04em;
    color:var(--ink); margin:0; line-height:1.2;
  }
  .meta{
    font-family:var(--sans); font-weight:300;
    font-size:12.5px; letter-spacing:.03em;
    color:var(--ink-soft); margin:3px 0 0; line-height:1.2;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .chev{
    position:relative; z-index:1; flex:0 0 auto;
    color:var(--gold); opacity:.7;
    transition:transform .4s cubic-bezier(.2,.7,.2,1), opacity .4s ease;
  }
  .chev svg{width:18px; height:18px; display:block;}
  .card:hover .chev,.card:focus-visible .chev{ transform:translateX(4px); opacity:1; }

  /* WhatsApp gets a whisper of priority */
  .card.primary{ border-color:rgba(200,163,95,.3); }
  .card.primary .roundel{ background:radial-gradient(circle at 32% 28%, rgba(235,211,160,.24), rgba(200,163,95,.06) 62%, rgba(0,0,0,0) 74%); }

  /* ---------- Footer ---------- */
  footer{ width:100%; margin-top:clamp(30px,7vw,44px); text-align:center; }
  .fdiv{display:flex; align-items:center; justify-content:center; gap:14px; width:min(220px,60%); margin:0 auto 18px;}
  .fdiv::before,.fdiv::after{content:""; height:1px; flex:1; background:linear-gradient(90deg,transparent,var(--line),transparent);}
  .fdiv svg{width:22px; height:14px; color:var(--gold); opacity:.85;}

  .loc{
    display:inline-flex; align-items:center; gap:8px;
    font-family:var(--sans); font-weight:400;
    font-size:13px; letter-spacing:.04em;
    color:var(--ink-soft); text-decoration:none;
    transition:color .35s ease;
  }
  .loc svg{width:15px; height:15px; color:var(--gold); flex:0 0 auto;}
  .loc:hover{color:var(--gold-lt);}
  .loc:focus-visible{outline:2px solid var(--gold); outline-offset:4px; border-radius:6px;}
  .copy{
    font-family:var(--sans); font-weight:300;
    font-size:10.5px; letter-spacing:.32em; text-indent:.32em;
    color:rgba(182,171,148,.55);
    margin:16px 0 0; text-transform:uppercase;
  }

  /* ---------- Entrance choreography ---------- */
  @keyframes drawArch{ to{ stroke-dashoffset:0; } }
  @keyframes riseIn{ from{opacity:0; transform:translateY(16px);} to{opacity:1; transform:none;} }
  @keyframes finialGlow{ 0%{opacity:0; transform:scale(.4);} 100%{opacity:1; transform:scale(1);} }

  .arch path{ stroke-dasharray:1400; stroke-dashoffset:1400; animation:drawArch 1.6s cubic-bezier(.5,0,.2,1) .15s forwards; }
  .arch .finial{ opacity:0; transform-origin:center; transform-box:fill-box; animation:finialGlow .6s ease 1.5s forwards; }

  .reveal{ opacity:0; animation:riseIn .8s cubic-bezier(.2,.7,.2,1) forwards; }
  .logo-shell{ animation-delay:.3s; }
  .cards .card:nth-child(1){ animation-delay:.62s; }
  .cards .card:nth-child(2){ animation-delay:.74s; }
  .cards .card:nth-child(3){ animation-delay:.86s; }
  .cards .card:nth-child(4){ animation-delay:.98s; }
  footer{ animation-delay:1.12s; }

  /* ---------- Wider screens ---------- */
  @media (min-width:600px){
    .card{ padding:18px 22px; }
  }

  /* ---------- Reduced motion ---------- */
  @media (prefers-reduced-motion:reduce){
    .arch path{ animation:none; stroke-dashoffset:0; }
    .arch .finial{ animation:none; opacity:1; }
    .reveal{ animation:none; opacity:1; transform:none; }
    .card,.card::before,.roundel,.chev{ transition:border-color .3s ease, color .3s ease; }
    .card:hover,.card:focus-visible{ transform:none; }
    .card::before{ display:none; }
  }
</style>
</head>
